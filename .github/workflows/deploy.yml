name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  # ── 1. Deploy Django backend → Hugging Face Spaces ─────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      hf_space_url: ${{ steps.hf_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Compute HF Space URL
        id: hf_url
        run: |
          USERNAME_LOWER=$(echo "${{ secrets.HF_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          SPACE_LOWER=$(echo "${{ secrets.HF_SPACE_NAME }}" | tr '[:upper:]' '[:lower:]')
          URL="https://${USERNAME_LOWER}-${SPACE_LOWER}.hf.space"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "HF Space URL: $URL"

      - name: Create HF Space (if not exists)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}"
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  private=False,
                  exist_ok=True,
              )
              print(f"Space ready: {repo_id}")
          except Exception as e:
              print(f"Space already exists or error: {e}")
          EOF

      - name: Upload backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}"

          # Upload the backend_django/ folder as the root of the HF Space
          api.upload_folder(
              folder_path="backend_django",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=["__pycache__", "*.pyc", ".venv", "db.sqlite3", "staticfiles", ".env"],
              commit_message="Deploy backend via GitHub Actions",
          )
          print(f"Uploaded backend to space: {repo_id}")
          EOF

      - name: Set HF Space env secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}"
          netlify_url = os.environ.get("NETLIFY_SITE_URL", "")
          cors_origins = f"https://{netlify_url}" if netlify_url else ""

          secrets_to_set = {
              "DJANGO_SECRET_KEY": os.environ.get("DJANGO_SECRET_KEY", "change-me-in-production"),
              "DJANGO_DEBUG": "False",
              "SQLITE_PATH": "/data/db.sqlite3",
              "DJANGO_ALLOWED_HOSTS": "*",
              "DJANGO_CORS_ALLOW_ALL_ORIGINS": "True",
          }
          if cors_origins:
              secrets_to_set["DJANGO_CORS_ALLOWED_ORIGINS"] = cors_origins

          for key, value in secrets_to_set.items():
              try:
                  api.add_space_secret(repo_id=repo_id, key=key, value=value)
                  print(f"Set secret: {key}")
              except Exception as e:
                  print(f"Could not set {key}: {e}")
          EOF

  # ── 2. Deploy React frontend → Netlify ─────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_react/package-lock.json

      - name: Install dependencies
        working-directory: web_react
        run: npm ci

      - name: Build React app
        working-directory: web_react
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.hf_space_url }}/api
        run: npm run build

      - name: Deploy to Netlify
        working-directory: web_react
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli deploy --prod --dir=dist --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
